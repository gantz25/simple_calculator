<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer ></script>
</head>
<body>
    <div class="calc-body">
   <div class="container-body">
     <div class = "display">
        </div>
<button data-type="control" class="clear">C</button>
<button data-type="control" class="delete">🔙</button>
<button data-type="op" class="divide">÷</button>
<button data-type="op" class="multiply">×</button>
<button data-type="number" class="seven">7</button>
<button data-type="number" class="eight">8</button>
<button data-type="number" class="nine">9</button>
<button data-type="op" class="minus">-</button>
<button data-type="number" class="four">4</button>
<button data-type="number" class="five">5</button>
<button data-type="number" class="six">6</button>
<button  data-type="op" class="add">+</button>
<button data-type="number" class="one">1</button>
<button data-type="number" class="two">2</button>
<button data-type="number" class="three">3</button>
<button data-type="equal" class="equal">=</button>
<button data-type="number" class="zero">0</button>
<button data-type="number" class="dot">.</button>

        </div>
    </div>
</body>
</html>
